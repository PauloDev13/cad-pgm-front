# Este arquivo será o seu default.conf dentro do container
server {
    listen 8080;
    server_name localhost;

    # 🌟 Aumenta o limite de upload para evitar o erro 413 do Nginx
    client_max_body_size 20M;

    # ROTA DO BACKEND (API)
    location /api/ {
        # 'backend' é o nome do serviço no docker-compose
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        proxy_read_timeout 90;
    }

    # ROTA DO FRONTEND (Arquivos Estáticos)
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # Suporte para rotas do Angular (F5 não dá 404)
        try_files $uri $uri/ /index.html;
    }

    # Tratamento amigável de erros de servidor (opcional)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
